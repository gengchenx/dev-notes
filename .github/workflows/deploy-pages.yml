# ============================================================
# 工作流名称：构建文档并部署到 GitHub Pages
# 触发条件：推送到指定分支时自动执行
# ============================================================
name: Deploy Docs to GitHub Pages

on:
  push:
    branches:
      - main  # 监听 main 分支，推送时自动触发；如需监听其他分支请修改此处

# ------------------------------------------------------------
# GITHUB_TOKEN 权限配置
# contents: read  —— 允许读取仓库代码
# pages: write    —— 允许写入 GitHub Pages
# id-token: write —— 允许 OIDC 身份验证（deploy-pages 需要）
# ------------------------------------------------------------
permissions:
  contents: read
  pages: write
  id-token: write

# ------------------------------------------------------------
# 并发控制：同一时间只允许一个部署任务运行
# cancel-in-progress: false —— 不取消正在运行的部署，排队等待
# ------------------------------------------------------------
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ============================================================
  # Job 1: 构建文档
  # ============================================================
  build:
    runs-on: ubuntu-latest  # 使用最新版 Ubuntu 运行环境

    steps:
      # 1. 拉取仓库代码
      - name: Checkout
        uses: actions/checkout@v4

      # 2. 配置 Node.js 环境
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'  # Node.js 版本，按需调整（支持 18 / 20 / 22）
          cache: 'npm'        # 缓存 npm 依赖，加速后续安装

      # 3. 安装项目依赖
      # 使用 npm ci 而非 npm install，确保严格按照 package-lock.json 安装，更稳定
      - name: Install dependencies
        run: npm ci

      # 4. 执行文档构建命令
      # 对应 package.json 中的 "docs:build" 脚本
      - name: Build docs
        run: npm run docs:build

      # 5. 打包构建产物，上传为 Pages artifact
      # path 为构建输出目录，常见框架默认路径：
      #   VitePress  → docs/.vitepress/dist
      #   VuePress 2 → docs/.vuepress/dist
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs  # 👈 请确认并修改为实际的构建输出目录

  # ============================================================
  # Job 2: 部署到 GitHub Pages
  # 依赖 build job 完成后才会执行
  # ============================================================
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}  # 部署成功后输出 Pages 访问地址

    runs-on: ubuntu-latest
    needs: build  # 声明依赖：必须等 build job 成功才执行

    steps:
      # 将 artifact 部署到 GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
